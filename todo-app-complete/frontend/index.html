<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Todo App</title>
    <style>
        :root {
            --primary: #2496ED; 
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #888;
            --success: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        button.btn-add {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button.btn-add:hover { background-color: #1a7abf; }

        ul { list-style: none; padding: 0; margin: 0; }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: all 0.2s ease-in-out;
            border-left: 4px solid var(--primary);
        }

        li:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        li.completed {
            border-left-color: var(--success);
            background: #f0fdf4;
            opacity: 0.8;
        }

        li.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* กล่องสถานะตอนกำลังแก้ไข */
        li.editing {
            border-left-color: #f39c12;
            background: #fffdf7;
            transform: none;
            box-shadow: none;
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            cursor: pointer;
        }

        .task-text {
            font-size: 16px;
            word-break: break-word;
        }

        .actions { display: flex; gap: 8px; }

        button.icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        button.icon-btn.edit:hover { background: #fff3cd; }
        button.icon-btn.delete:hover { background: #f8d7da; }
        button.icon-btn.save:hover { background: #d4edda; }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--success);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🐳 Docker To-Do List</h2>
    
    <div class="input-group">
        <input type="text" id="task" placeholder="What needs to be done?" onkeypress="handleKeyPress(event)">
        <button class="btn-add" onclick="addTask()">Add</button>
    </div>

    <ul id="list"></ul>
</div>

<script>
    const API_URL = 'http://localhost:5000/todos';
    let editingId = null; // ตัวแปรเก็บว่ากำลังแก้ไข Task ไหนอยู่

    // 1. View Tasks
    async function fetchTasks() {
        const res = await fetch(API_URL);
        const todos = await res.json();
        const listEl = document.getElementById('list');
        
        if (todos.length === 0) {
            listEl.innerHTML = '<p style="text-align: center; color: #888;">No tasks yet. Add one above! ✨</p>';
            return;
        }

        listEl.innerHTML = todos.map(t => {
            // โหมดกำลังแก้ไข (Inline Edit)
            if (t.id === editingId) {
                return `
                    <li class="editing">
                        <input type="text" id="edit-input-${t.id}" value="${t.task.replace(/"/g, '&quot;')}" style="flex: 1; margin-right: 10px; padding: 8px;">
                        <div class="actions">
                            <button class="icon-btn save" onclick="saveEdit('${t.id}', ${t.completed})" title="Save">💾</button>
                            <button class="icon-btn delete" onclick="cancelEdit()" title="Cancel">✖️</button>
                        </div>
                    </li>
                `;
            }

            // โหมดแสดงผลปกติ
            return `
                <li class="${t.completed ? 'completed' : ''}">
                    <div class="task-info" onclick="toggleComplete('${t.id}', ${t.completed}, '${t.task.replace(/'/g, "\\'")}')">
                        <input type="checkbox" ${t.completed ? 'checked' : ''}>
                        <span class="task-text">${t.task}</span>
                    </div>
                    <div class="actions">
                        <button class="icon-btn edit" onclick="startEdit('${t.id}')" title="Edit">✏️</button>
                        <button class="icon-btn delete" onclick="deleteTask('${t.id}')" title="Delete">🗑️</button>
                    </div>
                </li>
            `;
        }).join('');
    }

    // 2. Add Task
    async function addTask() {
        const taskInput = document.getElementById('task');
        const task = taskInput.value.trim();
        if (!task) return;

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task: task, completed: false })
        });
        taskInput.value = '';
        fetchTasks();
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') addTask();
    }

    // 3. Delete Task (ลบทันที ไม่มีถาม)
    async function deleteTask(id) {
        await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        fetchTasks();
    }

    // 4. Mark as Completed
    async function toggleComplete(id, currentStatus, taskText) {
        if (editingId === id) return; // ป้องกันการกดสลับตอนกำลังพิมพ์แก้
        await fetch(`${API_URL}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task: taskText, completed: !currentStatus })
        });
        fetchTasks();
    }

    // 5. ระบบ Edit แบบ Inline
    function startEdit(id) {
        editingId = id;
        fetchTasks(); // รีเฟรชเพื่อเปลี่ยน UI เป็นช่องพิมพ์
    }

    function cancelEdit() {
        editingId = null;
        fetchTasks(); // รีเฟรชกลับเป็นโหมดปกติ
    }

    async function saveEdit(id, currentStatus) {
        const inputEl = document.getElementById(`edit-input-${id}`);
        const newTaskText = inputEl.value.trim();
        
        if (newTaskText !== "") {
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task: newTaskText, completed: currentStatus })
            });
        }
        editingId = null;
        fetchTasks();
    }

    fetchTasks();
</script>

</body>
</html>
