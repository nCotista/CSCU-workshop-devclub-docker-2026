version: '3.8'

services:

  frontend:
    build: ./frontend 
    ports:
      - "8080:80" #----> http://localhost:8080/
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - redis-db

  redis-db:
    image: redis:alpine
    ports:
      - "6379:6379"

